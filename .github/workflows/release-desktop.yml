name: Release Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to publish (e.g. v0.1.0)"
        required: true

permissions:
  contents: read

env:
  ELECTRON_VERSION: "33.4.11"

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Checkout tag commit (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git fetch --tags
          if git rev-parse "refs/tags/${{ inputs.tag }}" >/dev/null 2>&1; then
            git checkout "${{ inputs.tag }}"
          else
            echo "::error::Tag ${{ inputs.tag }} does not exist. Create it first: git tag ${{ inputs.tag }} && git push origin ${{ inputs.tag }}"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build Next standalone server
        run: npm run build:web

      - name: Build desktop TypeScript
        run: npm run build --workspace @media-track/desktop

      # Turbopack also emits a hashed copy of better-sqlite3 under
      # standalone/apps/web/.next/node_modules/ and the generated server code
      # requires THAT copy — so every better_sqlite3.node in the standalone
      # tree must be swapped, not just node_modules/better-sqlite3/.
      - name: Swap better-sqlite3 to Electron ABI (all copies)
        run: |
          (cd apps/web/.next/standalone/node_modules/better-sqlite3 && npx prebuild-install -r electron -t ${{ env.ELECTRON_VERSION }})
          SRC="apps/web/.next/standalone/node_modules/better-sqlite3/build/Release/better_sqlite3.node"
          # Real copies in the standalone tree (null-delimited; no -L so the
          # traversal stays inside the tree)
          find apps/web/.next/standalone -name "better_sqlite3.node" -print0 | while IFS= read -r -d '' f; do
            [ "$f" -ef "$SRC" ] && continue
            echo "Replacing $f"
            cp "$SRC" "$f"
          done
          # Turbopack's hashed entries under .next/node_modules are LINKS
          # (electron-builder dereferences them at package time) — write through
          # each link's resolved path so the target gets the swapped binary
          # wherever it actually lives.
          for d in apps/web/.next/standalone/apps/web/.next/node_modules/better-sqlite3-*; do
            t="$d/build/Release/better_sqlite3.node"
            [ -e "$t" ] || continue
            [ "$t" -ef "$SRC" ] && continue
            echo "Replacing $t (via link)"
            cp "$SRC" "$t"
          done

      - name: Verify ABI swap actually happened
        run: |
          cat > /tmp/abi-check.js <<'SCRIPT'
          const Database = require(process.env.GITHUB_WORKSPACE + '/apps/web/.next/standalone/node_modules/better-sqlite3');
          new Database(':memory:').exec('CREATE TABLE t(x)');
          console.log('ABI_OK modules=' + process.versions.modules);
          SCRIPT
          ELECTRON_RUN_AS_NODE=1 "$(npm root)/electron/dist/Electron.app/Contents/MacOS/Electron" /tmp/abi-check.js
          # Every copy the packaged app can dereference (real files in the
          # standalone tree + the resolved targets of Turbopack's hashed link
          # entries) must be byte-identical to the swapped one.
          SRC="apps/web/.next/standalone/node_modules/better-sqlite3/build/Release/better_sqlite3.node"
          REF=$(shasum -a 256 "$SRC" | cut -d' ' -f1)
          check() {
            H=$(shasum -a 256 "$1" | cut -d' ' -f1)
            echo "$H  $1"
            if [ "$H" != "$REF" ]; then
              echo "::error::ABI swap missed a copy: $1"
              exit 1
            fi
          }
          find apps/web/.next/standalone -name "better_sqlite3.node" -print0 | while IFS= read -r -d '' f; do
            check "$f"
          done
          for d in apps/web/.next/standalone/apps/web/.next/node_modules/better-sqlite3-*; do
            t="$d/build/Release/better_sqlite3.node"
            [ -e "$t" ] || continue
            check "$t"
          done

      - name: Import signing certificate
        env:
          MAC_CERT_P12_BASE64: ${{ secrets.MAC_CERT_P12_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          KC="$RUNNER_TEMP/build.keychain-db"
          KC_PASS=$(uuidgen)
          echo "$MAC_CERT_P12_BASE64" | base64 -D -o /tmp/cert.p12
          security create-keychain -p "$KC_PASS" "$KC"
          security unlock-keychain -p "$KC_PASS" "$KC"
          security set-keychain-settings -t 3600 -u "$KC"
          security import /tmp/cert.p12 -k "$KC" -P "$MAC_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -s "$KC"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KC_PASS" "$KC"
          rm /tmp/cert.p12

      - name: Package + sign + notarize DMG
        env:
          CSC_NAME: "Qinghai Wu (P8GK36YA6D)"
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run dist --workspace @media-track/desktop

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: apps/desktop/dist-app/*.dmg
          if-no-files-found: error
          retention-days: 7

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout tag commit (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          git fetch --tags
          if (git rev-parse "refs/tags/${{ inputs.tag }}" 2>$null) {
            git checkout "${{ inputs.tag }}"
          } else {
            Write-Error "Tag ${{ inputs.tag }} does not exist"
            exit 1
          }

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build Next standalone server
        run: npm run build:web

      - name: Build desktop TypeScript
        run: npm run build --workspace @media-track/desktop

      # Turbopack also emits a hashed copy of better-sqlite3 under
      # standalone/apps/web/.next/node_modules/ and the generated server code
      # requires THAT copy — so every better_sqlite3.node in the standalone
      # tree must be swapped, not just node_modules/better-sqlite3/.
      - name: Swap better-sqlite3 to Electron ABI (all copies)
        shell: pwsh
        run: |
          $bsqDir = "apps/web/.next/standalone/node_modules/better-sqlite3"
          $bsqVersion = (Get-Content "$bsqDir/package.json" | ConvertFrom-Json).version
          $abiMap = @{ "33.4.11" = 130 }
          $abi = $abiMap[$env:ELECTRON_VERSION]
          if (-not $abi) { throw "No ABI mapping for Electron $env:ELECTRON_VERSION — update the abiMap" }
          $url = "https://github.com/WiseLibs/better-sqlite3/releases/download/v$bsqVersion/better-sqlite3-v$bsqVersion-electron-v$abi-win32-x64.tar.gz"
          Write-Host "Downloading $url"
          $tmpFile = Join-Path $env:TEMP "bsq.tar.gz"
          Invoke-WebRequest -Uri $url -OutFile $tmpFile
          $extractDir = Join-Path $env:TEMP "bsq-extract"
          New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
          tar -xzf $tmpFile -C $extractDir
          $nodeFile = Get-ChildItem -Path $extractDir -Recurse -Filter "better_sqlite3.node" | Select-Object -First 1
          if (-not $nodeFile) { throw "better_sqlite3.node not found in archive" }
          # Show what Turbopack's hashed node_modules entries actually are
          # (on Windows they are junctions/symlinks whose ABSOLUTE target is the
          # hoisted ROOT node_modules, and Get-ChildItem -Recurse does not enter
          # reparse points — electron-builder dereferences them at package time).
          foreach ($d in @("apps/web/.next/node_modules", "apps/web/.next/standalone/apps/web/.next/node_modules")) {
            if (Test-Path $d) {
              Get-ChildItem $d -Filter "better-sqlite3*" | ForEach-Object { Write-Host "NEXT_NM: $($_.FullName) LinkType=$($_.LinkType) Target=$($_.Target)" }
            }
          }
          # Replace every copy the packaged app can dereference: real files in
          # the standalone tree (plain -Recurse skips reparse points, so this
          # stays inside the tree), the resolved targets of Turbopack's hashed
          # link entries (enumerated explicitly, not by following links), and
          # the root node_modules copy (the junctions' ultimate target).
          $targets = @(Get-ChildItem -Path "apps/web/.next/standalone" -Recurse -Filter "better_sqlite3.node" -ErrorAction SilentlyContinue |
            Select-Object -ExpandProperty FullName)
          $targets += @(Get-Item "apps/web/.next/standalone/apps/web/.next/node_modules/better-sqlite3-*/build/Release/better_sqlite3.node" -ErrorAction SilentlyContinue |
            Select-Object -ExpandProperty FullName)
          $rootCopy = "node_modules/better-sqlite3/build/Release/better_sqlite3.node"
          if (Test-Path $rootCopy) { $targets += (Resolve-Path $rootCopy).Path }
          $targets = @($targets | Select-Object -Unique)
          if (-not $targets) { throw "no better_sqlite3.node found to replace" }
          foreach ($t in $targets) {
            Write-Host "Replacing $t"
            Copy-Item -Path $nodeFile.FullName -Destination $t -Force
          }
          Remove-Item $tmpFile, $extractDir -Recurse -Force

      - name: Verify ABI swap actually happened
        shell: pwsh
        run: |
          $bsqPath = (Resolve-Path "apps/web/.next/standalone/node_modules/better-sqlite3").Path -replace '\\','/'
          $abiCheck = Join-Path $env:TEMP "abi-check.js"
          "const Database = require('$bsqPath'); new Database(':memory:').exec('CREATE TABLE t(x)'); console.log('ABI_OK modules=' + process.versions.modules);" | Out-File -Encoding utf8 $abiCheck
          $env:ELECTRON_RUN_AS_NODE = "1"
          & "$(npm root)/electron/dist/electron.exe" $abiCheck
          if ($LASTEXITCODE -ne 0) { throw "electron ABI check failed" }
          # Every copy the packaged app can dereference (real files in the
          # standalone tree + the resolved targets of the hashed link entries +
          # the root node_modules copy) must be byte-identical to the swapped one.
          $ref = (Get-FileHash "apps/web/.next/standalone/node_modules/better-sqlite3/build/Release/better_sqlite3.node").Hash
          $files = @(Get-ChildItem -Path "apps/web/.next/standalone" -Recurse -Filter "better_sqlite3.node" -ErrorAction SilentlyContinue |
            Select-Object -ExpandProperty FullName)
          $files += @(Get-Item "apps/web/.next/standalone/apps/web/.next/node_modules/better-sqlite3-*/build/Release/better_sqlite3.node" -ErrorAction SilentlyContinue |
            Select-Object -ExpandProperty FullName)
          $rootCopy = "node_modules/better-sqlite3/build/Release/better_sqlite3.node"
          if (Test-Path $rootCopy) { $files += (Resolve-Path $rootCopy).Path }
          foreach ($f in ($files | Select-Object -Unique)) {
            $h = (Get-FileHash $f).Hash
            Write-Host "$h  $f"
            if ($h -ne $ref) { throw "ABI swap missed a copy: $f" }
          }

      - name: Package Windows installer
        run: npm run dist --workspace @media-track/desktop
        env:
          CSC_LINK: ""
          CSC_KEY_PASSWORD: ""

      # Release gate: install the freshly-built exe on this runner and require
      # the app to actually boot and serve HTTP 200 before anything is
      # uploaded. Catches packaging-level breakage (e.g. wrong-ABI native
      # modules) that build-time checks can't see.
      - name: Smoke test installer (install + launch + health)
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "apps/desktop/dist-app" -Filter "*.exe" | Select-Object -First 1
          if (-not $installer) { throw "no installer exe found in dist-app" }
          Write-Host "Installing $($installer.FullName)"
          Start-Process -FilePath $installer.FullName -ArgumentList "/S" -Wait
          # electron-builder's per-user NSIS always installs under
          # LOCALAPPDATA\Programs — bounded-depth search there only; if the
          # install location ever changes this fails loud and we update it.
          $exe = Get-ChildItem -Path "$env:LOCALAPPDATA\Programs" -Recurse -Depth 2 -Filter "Mediary Scout.exe" -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          if (-not $exe) { throw "installed Mediary Scout.exe not found under $env:LOCALAPPDATA\Programs" }
          Write-Host "EXE: $exe"
          $env:ELECTRON_ENABLE_LOGGING = "1"
          $proc = Start-Process -FilePath $exe -PassThru -RedirectStandardOutput "$env:TEMP\electron-stdout.txt" -RedirectStandardError "$env:TEMP\electron-stderr.txt"
          $manifest = Join-Path $env:USERPROFILE ".mediary\agent.json"
          $deadline = (Get-Date).AddSeconds(120)
          $healthy = $false
          $crashed = $false
          while ((Get-Date) -lt $deadline) {
            if ($proc.HasExited) { $crashed = $true; break }
            if (Test-Path $manifest) {
              try {
                $baseUrl = (Get-Content $manifest | ConvertFrom-Json).baseUrl
                $resp = Invoke-WebRequest -Uri $baseUrl -TimeoutSec 5
                if ($resp.StatusCode -eq 200) { $healthy = $true; break }
              } catch {}
            }
            Start-Sleep -Seconds 3
          }
          if (-not $proc.HasExited) { Stop-Process -Id $proc.Id -Force }
          Write-Host "=== ELECTRON STDERR (first 40 lines) ==="
          Get-Content "$env:TEMP\electron-stderr.txt" -ErrorAction SilentlyContinue | Select-Object -First 40
          if (Select-String -Path "$env:TEMP\electron-stderr.txt" -Pattern "NODE_MODULE_VERSION" -Quiet) {
            throw "ABI mismatch in packaged app"
          }
          if ($crashed) { throw "Electron process exited early with code $($proc.ExitCode)" }
          if (-not $healthy) { throw "installed app never answered 200 on its baseUrl within 120s" }
          Write-Host "SMOKE OK: $baseUrl answered 200"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: apps/desktop/dist-app/*.exe
          if-no-files-found: error
          retention-days: 7

  # Atomic release gate: nothing reaches the Releases page unless BOTH
  # platform builds (including the Windows install-and-boot smoke test)
  # succeeded. Publishing from a single job prevents the mixed-version
  # state where a fresh DMG sits next to a stale EXE because one
  # platform's gate failed after the other had already uploaded.
  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload DMG + installer to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            dist/*.dmg
            dist/*.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
