name: Diagnose Windows build v2

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build Next standalone server
        run: npm run build:web

      - name: Build desktop TypeScript
        run: npm run build --workspace @media-track/desktop
        env:
          ELECTRON_VERSION: "33.4.11"

      - name: Swap better-sqlite3 to Electron ABI
        shell: pwsh
        run: |
          $bsqDir = "apps/web/.next/standalone/node_modules/better-sqlite3"
          $bsqVersion = (Get-Content "$bsqDir/package.json" | ConvertFrom-Json).version
          $url = "https://github.com/WiseLibs/better-sqlite3/releases/download/v$bsqVersion/better-sqlite3-v$bsqVersion-electron-v130-win32-x64.tar.gz"
          Write-Host "Downloading $url"
          $tmpFile = Join-Path $env:TEMP "bsq.tar.gz"
          Invoke-WebRequest -Uri $url -OutFile $tmpFile
          $extractDir = Join-Path $env:TEMP "bsq-extract"
          New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
          tar -xzf $tmpFile -C $extractDir
          $nodeFile = Get-ChildItem -Path $extractDir -Recurse -Filter "better_sqlite3.node" | Select-Object -First 1
          if (-not $nodeFile) { throw "better_sqlite3.node not found in archive" }
          # Replace ALL copies — Turbopack emits a hashed copy under
          # standalone/apps/web/.next/node_modules/ that the server actually loads.
          $targets = Get-ChildItem -Path "apps/web/.next/standalone" -Recurse -Filter "better_sqlite3.node"
          if (-not $targets) { throw "no better_sqlite3.node found under standalone" }
          foreach ($t in $targets) {
            Write-Host "Replacing $($t.FullName)"
            Copy-Item -Path $nodeFile.FullName -Destination $t.FullName -Force
          }
          Remove-Item $tmpFile, $extractDir -Recurse -Force

      - name: Package Windows installer
        run: npm run dist --workspace @media-track/desktop
        env:
          CSC_LINK: ""
          CSC_KEY_PASSWORD: ""

      - name: Install + diagnose
        shell: pwsh
        run: |
          # Install
          $installer = Get-ChildItem -Path "apps/desktop/dist-app" -Filter "*.exe" | Select-Object -First 1
          Write-Host "Installing $($installer.FullName)"
          Start-Process -FilePath $installer.FullName -ArgumentList "/S" -Wait

          # Find the installed app dir
          $exe = Get-ChildItem -Path "$env:LOCALAPPDATA","$env:PROGRAMFILES","${env:PROGRAMFILES(x86)}" -Recurse -Filter "Mediary Scout.exe" -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          Write-Host "EXE: $exe"
          $appDir = Split-Path $exe
          $resourcesDir = Join-Path $appDir "resources"
          Write-Host "RESOURCES: $resourcesDir EXISTS: $(Test-Path $resourcesDir)"

          # server.js
          $serverJs = Join-Path $resourcesDir "app\apps\web\server.js"
          Write-Host "SERVER: $serverJs EXISTS: $(Test-Path $serverJs)"
          if (-not (Test-Path $serverJs)) {
            Write-Host "=== Searching for server.js ==="
            Get-ChildItem -Path $appDir -Recurse -Filter "server.js" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "FOUND: $($_.FullName)" }
          }

          # All better-sqlite3 binaries
          Write-Host "=== All better_sqlite3.node files ==="
          $bsqFiles = Get-ChildItem -Path $appDir -Recurse -Filter "better_sqlite3.node" -ErrorAction SilentlyContinue
          foreach ($b in $bsqFiles) { Write-Host "BSQLITE: $($b.FullName) SIZE: $($b.Length)" }

          # Run Electron main process with full logging
          Write-Host "=== Running Electron main process (20s) ==="
          $env:ELECTRON_ENABLE_LOGGING = "1"
          $env:MEDIA_TRACK_SQLITE_PATH = Join-Path $env:APPDATA "@media-track\desktop\mediary.db"
          $proc = Start-Process -FilePath $exe -PassThru -RedirectStandardOutput "$env:TEMP\electron-stdout.txt" -RedirectStandardError "$env:TEMP\electron-stderr.txt"
          Start-Sleep -Seconds 20
          Write-Host "=== ELECTRON STDOUT (first 40 lines) ==="
          Get-Content "$env:TEMP\electron-stdout.txt" -ErrorAction SilentlyContinue | Select-Object -First 40
          Write-Host "=== ELECTRON STDERR (first 40 lines) ==="
          Get-Content "$env:TEMP\electron-stderr.txt" -ErrorAction SilentlyContinue | Select-Object -First 40
          Write-Host "=== PROCESS ALIVE: $(-not $proc.HasExited) ==="
          if (-not $proc.HasExited) { Stop-Process -Id $proc.Id -Force }

          # Check ports
          Write-Host "=== Listening ports ==="
          netstat -ano | findstr "LISTENING" | findstr "127.0.0.1"
